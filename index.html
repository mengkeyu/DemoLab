<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo试验场</title>
  <style>
    :root {
      --bg: #f8fafc;
      --bg-soft: #eef2ff;
      --surface: #ffffff;
      --surface-strong: #f9fbff;
      --line: #dbe4f0;
      --line-strong: #c4d3ea;
      --text-main: #1f2937;
      --text-sub: #6b7280;
      --primary: #3b82f6;
      --secondary: #06b6d4;
      --accent: #f97316;
      --ok: #10b981;
    }

    * {
      box-sizing: border-box;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.12) 0, transparent 45%),
        radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.1) 0, transparent 50%),
        linear-gradient(180deg, #ffffff 0, var(--bg) 100%);
      padding: 24px;
    }

    .frame {
      max-width: 1120px;
      margin: 0 auto;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 36px;
      background: linear-gradient(180deg, #ffffff 0, var(--surface-strong) 100%);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.05;
      letter-spacing: -0.8px;
      font-weight: 900;
      color: #0f172a;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #047857;
      background: rgba(16, 185, 129, 0.08);
      font-size: 13px;
      font-weight: 700;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.55);
    }

    .content {
      padding: 34px;
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .card {
      position: relative;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      isolation: isolate;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -30% auto auto -30%;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.16) 0, rgba(59, 130, 246, 0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--line-strong);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.12);
    }

    .chip {
      width: fit-content;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 999px;
      padding: 5px 11px;
    }

    .card h2 {
      margin: 0;
      font-size: 24px;
      color: #0f172a;
    }

    .card p {
      margin: 0;
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.7;
      min-height: 48px;
    }

    .path {
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f8fbff;
      font-family: Consolas, "Courier New", monospace;
      font-size: 11px;
      padding: 10px;
      color: #2563eb;
      word-break: break-all;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 8px 18px rgba(59, 130, 246, 0.28);
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(1.04);
      box-shadow: 0 12px 24px rgba(59, 130, 246, 0.33);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      flex-direction: column;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(4px);
    }

    .overlay.show {
      display: flex;
    }

    .player-bar {
      height: 70px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      color: var(--text-main);
    }

    .close {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, #f43f5e, #f97316);
      cursor: pointer;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #0f172a;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .header {
        padding: 24px 20px;
      }

      .brand h1 {
        font-size: 30px;
      }

      .content {
        padding: 22px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <header class="header">
      <div class="brand">
        <h1>Demo试验场</h1>
        <p>Creative Game Lab</p>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        系统就绪
      </div>
    </header>
    <main id="cards" class="content"></main>
  </div>

  <section id="overlay" class="overlay">
    <div class="player-bar">
      <div id="player-title" style="font-weight: 700;"></div>
      <button id="close-player" class="close">退出游戏</button>
    </div>
    <iframe id="player-frame" src="about:blank"></iframe>
  </section>

  <script>
    const games = [
      {
        id: "game-01",
        title: "末日收割1.0",
        category: "Arcade",
        description: "在深海废墟中收集资源，躲避未知风险并冲击高分。",
        path: "./games/Game_01/index.html"
      },
      {
      id: "game-02",
      title: "末日收割2.0",
      category: "Arcade",
      description: "在深海废墟中收集资源，躲避未知风险并冲击高分。",
      path: "./games/Game_02/index.html"
      }
    ];

    const cardsContainer = document.getElementById("cards");
    const overlay = document.getElementById("overlay");
    const playerFrame = document.getElementById("player-frame");
    const playerTitle = document.getElementById("player-title");

    function render() {
      cardsContainer.innerHTML = games.map(game => `
        <article class="card">
          <span class="chip">${game.category}</span>
          <h2>${game.title}</h2>
          <p>${game.description}</p>
          <div class="path">URL: ${game.path}</div>
          <button class="btn" onclick="launch('${game.id}')">进入试验场</button>
        </article>
      `).join("");
    }

    window.launch = function(id) {
      const game = games.find(g => g.id === id);
      if (!game) return;
      playerTitle.textContent = game.title;
      playerFrame.src = game.path;
      overlay.classList.add("show");
      document.body.style.overflow = "hidden";
    };

    document.getElementById("close-player").onclick = () => {
      overlay.classList.remove("show");
      playerFrame.src = "about:blank";
      document.body.style.overflow = "";
    };

    render();
  </script>
</body>
</html>
