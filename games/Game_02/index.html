<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>末日水世界：深海大收割</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #010409; 
            font-family: 'Arial Black', sans-serif; user-select: none; 
            touch-action: none; color: white; -webkit-touch-callout: none;
        }
        canvas { display: block; }
        
        /* UI 适配层 */
        .overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; 
            background: rgba(1, 4, 9, 0.9); backdrop-filter: blur(15px); 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
        }
        .hidden { display: none !important; }
        
        /* 顶部 HUD */
        .status-ui { 
            position: absolute; top: calc(10px + env(safe-area-inset-top)); 
            width: 90%; left: 50%; transform: translateX(-50%); 
            display: flex; flex-direction: column; gap: 5px; z-index: 100; pointer-events: none;
        }
        .bar-wrap { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .hull-fill { width: 100%; height: 100%; background: #ef4444; transition: width 0.2s; box-shadow: 0 0 10px #ef4444; }
        .goal-fill { width: 0%; height: 100%; background: #f6e05e; transition: width 0.3s; }
        .label { font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; }

        /* 技能指示器 */
        .skills-hud {
            position: absolute; bottom: 100px; right: 20px; display: flex; flex-direction: column; gap: 5px; align-items: flex-end;
        }
        .skill-item { background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 10px; border: 1px solid #4fd1c5; font-size: 10px; color: #4fd1c5; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 鲨鱼警报 */
        #shark-warning {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            color: #ef4444; font-size: 20px; font-weight: 900; letter-spacing: 4px;
            text-shadow: 0 0 20px #ef4444; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 120;
        }
        .warning-active { opacity: 1 !important; animation: warning-blink 0.5s infinite; }
        @keyframes warning-blink { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }

        /* Jackpot 提示 */
        #jackpot-notice { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 70px; color: #ffd700; font-style: italic; opacity: 0; pointer-events: none; 
            text-shadow: 0 0 40px #ffd700, 3px 3px 0 #000; z-index: 150; text-align: center; 
        }
        .jackpot-active #jackpot-notice { animation: jp-blink 0.5s infinite; opacity: 1; }
        @keyframes jp-blink { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }

        #danger-flash {
            position: absolute; inset: 0; pointer-events: none; z-index: 150;
            box-shadow: inset 0 0 0px rgba(239, 68, 68, 0); transition: box-shadow 0.1s;
        }
        .danger-active { box-shadow: inset 0 0 120px rgba(239, 68, 68, 0.7) !important; }
    </style>
</head>
<body id="game-body">

    <div id="danger-flash"></div>
    <div id="jackpot-notice">GOLDEN SHOWER!</div>
    <div id="shark-warning">⚠️ 猎杀警告：凶猛巨鲨 ⚠️</div>

    <div class="status-ui">
        <div>
            <div class="label"><span class="text-red-500">船体寿命 HULL</span><span id="hull-text">100%</span></div>
            <div class="bar-wrap"><div id="hull-fill" class="hull-fill"></div></div>
        </div>
        <div>
            <div class="label"><span class="text-yellow-500">收获目标 GOAL</span><span id="goal-text">0 / 250</span></div>
            <div class="bar-wrap"><div id="goal-fill" class="goal-fill"></div></div>
        </div>
    </div>

    <div class="absolute top-[80px] left-[20px] text-2xl font-black" id="score-text">0</div>
    <div class="absolute top-[80px] right-[20px] text-xl font-black text-cyan-400" id="bullet-count-text">BARRAGE: 1</div>
    
    <div class="skills-hud" id="skills-list"></div>

    <div id="screen-home" class="overlay">
        <div class="text-center bg-white/5 p-10 rounded-[40px] border border-white/10 shadow-2xl backdrop-blur-md">
            <h1 class="text-5xl font-black italic mb-2 bg-clip-text text-transparent bg-gradient-to-b from-yellow-300 to-yellow-600">深海掠夺者</h1>
            <p class="text-blue-300 text-[9px] tracking-[0.4em] mb-10 uppercase text-center">Shark Predator Edition</p>
            <div class="text-xs text-gray-400 mb-8 text-left space-y-3 px-4">
                <p>• 🕹️ <b>操控移动</b>：船只全向航行，始终朝前射击</p>
                <p>• 🦈 <b>鲨鱼威胁</b>：别让巨鲨靠近，它们会锁定并追杀你</p>
                <p>• 🛡️ <b>脱战策略</b>：保持在攻击范围外 5 秒即可摆脱追杀</p>
                <p>• 💰 <b>3D爆金币</b>：击碎单位（包括巨鲨）爆出海量翻转金币</p>
            </div>
            <button id="btn-start" class="bg-gradient-to-r from-yellow-400 to-yellow-600 text-black px-12 py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform">启动引擎</button>
        </div>
    </div>

    <div id="screen-gameover" class="overlay hidden">
        <div class="text-center bg-white/5 p-12 rounded-[40px] border border-white/10">
            <h2 class="text-4xl font-black text-red-500 mb-4 italic">系统离线</h2>
            <div id="final-score" class="text-6xl font-black mb-10 text-white">0</div>
            <button id="btn-restart" class="bg-red-500 text-white px-10 py-4 rounded-xl font-black">重新启动</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const CONFIG = {
            worldSize: 6000,
            initialAtk: 50,
            baseFireRate: 200, 
            fishLimit: 350,       
            sharkLimit: 4,        // 全图同时存在的鲨鱼数量
            scrapCount: 15,       
            shipSpeed: 3.2,       
            hullMax: 100,
            fleeRange: 400,       
            flockingRange: 1200,
            sharkDetectRange: 800,  // 鲨鱼感知距离
            sharkChaseTime: 300,   // 5秒退战 (60fps * 5)
            jackpotDuration: 600,
            dpr: window.devicePixelRatio || 1
        };

        const TYPES = {
            FISH_S: { size: 24, val: 20, hp: 15, weight: 1, icon: '🐟', color: '#63b3ed', spd: 2.2, group: [15, 25] },
            FISH_M: { size: 45, val: 100, hp: 80, weight: 3, icon: '🐠', color: '#fbd38d', spd: 1.6, group: [5, 8] },
            FISH_L: { size: 90, val: 600, hp: 500, weight: 15, icon: '🦈', color: '#fc8181', spd: 1.2, group: [1, 2], damage: 15 },
            WRECK:  { size: 150, val: 2000, hp: 2000, weight: 50, icon: '🚢', color: '#94a3b8', spd: 0, group: [1, 1], damage: 30 },
            BAG:    { size: 100, val: 5000, hp: 100, weight: 100, icon: '💰', color: '#ffd700', spd: 4, damage: 0, group: [1, 1], isJackpot: true },
            SHARK:  { size: 110, val: 8000, hp: 1500, weight: 150, icon: '🦈', color: '#64748b', spdIdle: 1.5, spdChase: 4.5, damage: 35, isBoss: true }
        };

        const SCRAP_TYPES = {
            MULT: { color: '#22c55e', text: '弹幕+', type: 'mult', val: 8, duration: [5, 8] },
            ATK:  { color: '#fbbf24', text: '威力+', type: 'atk', val: 2.5, duration: [5, 8] },
            SPD:  { color: '#3b82f6', text: '攻速+', type: 'rate', val: 0.5, duration: [4, 6] }
        };

        let width, height;
        let gameState = 'HOME';
        let level = 1;
        let score = 0, collected = 0, target = 250, lastTime = 0;
        let screenShake = 0, jackpotTimer = 0;

        let activeSkills = { multishot: 0, power: 0, haste: 0 };
        const camera = { x: 0, y: 0, zoom: 1.1, targetZoom: 1.1 };
        const player = {
            worldX: CONFIG.worldSize / 2, worldY: CONFIG.worldSize / 2,
            angle: -Math.PI / 2,
            hull: CONFIG.hullMax, atk: CONFIG.initialAtk,
            fireRate: CONFIG.baseFireRate,
            lastFire: 0, speed: CONFIG.shipSpeed, size: 30, vx: 0, vy: 0
        };

        class Joystick {
            constructor() {
                this.active = false; this.baseX = 0; this.baseY = 0;
                this.currX = 0; this.currY = 0; this.maxRadius = 65;
            }
            draw() {
                if (!this.active) return;
                ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.globalAlpha = 0.2;
                ctx.beginPath(); ctx.arc(this.baseX, this.baseY, this.maxRadius, 0, Math.PI*2);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.stroke();
                ctx.beginPath(); ctx.arc(this.currX, this.currY, 25, 0, Math.PI*2);
                ctx.fillStyle = "#fff"; ctx.fill(); ctx.restore();
            }
            getValues() {
                if (!this.active) return { x: 0, y: 0 };
                const dx = this.currX - this.baseX, dy = this.currY - this.baseY;
                const dist = Math.hypot(dx, dy);
                return { x: dx / this.maxRadius, y: dy / this.maxRadius };
            }
        }

        const joystick = new Joystick();
        let fishes = [], harpoons = [], scraps = [], particles = [], sharks = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = CONFIG.dpr;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }

        // --- 类定义 ---

        class Harpoon {
            constructor(wx, wy, angle, isSpecial = false) {
                this.wx = wx; this.wy = wy;
                const spd = 38;
                this.vx = Math.cos(angle) * spd; this.vy = Math.sin(angle) * spd;
                this.angle = angle; this.active = true;
                this.isSpecial = isSpecial;
                this.passedScrapIds = new Set();
            }
            update() {
                this.wx += this.vx; this.wy += this.vy;
                if (Math.hypot(this.wx - player.worldX, this.wy - player.worldY) > 2000) this.active = false;
                scraps.forEach(s => {
                    if (this.active && s.active && !this.passedScrapIds.has(s.id)) {
                        if (Math.hypot(this.wx - s.wx, this.wy - s.wy) < s.size) {
                            this.passedScrapIds.add(s.id);
                            s.burst();
                        }
                    }
                });
            }
            draw() {
                const s = worldToScreen(this.wx, this.wy);
                ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(this.angle);
                ctx.fillStyle = this.isSpecial ? "#4fd1c5" : "#fff";
                if (this.isSpecial) { ctx.shadowBlur = 10; ctx.shadowColor = "#4fd1c5"; }
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-20, -7); ctx.lineTo(-20, 7); ctx.closePath(); ctx.fill();
                ctx.restore();
            }
        }

        class Scrap {
            constructor() {
                this.id = Math.random(); this.size = 40; this.init(true);
            }
            init(first = false) {
                const keys = Object.keys(SCRAP_TYPES);
                this.conf = SCRAP_TYPES[keys[Math.floor(Math.random()*keys.length)]];
                const ang = Math.random() * Math.PI * 2;
                const dist = first ? (400 + Math.random() * 1000) : (2000 + Math.random() * 800);
                this.wx = player.worldX + Math.cos(ang) * dist;
                this.wy = player.worldY + Math.sin(ang) * dist;
                this.active = true;
                this.pulse = Math.random() * 10;
            }
            burst() {
                const isAnyActive = activeSkills.multishot > 0 || activeSkills.power > 0 || activeSkills.haste > 0;
                if (isAnyActive) return;
                this.active = false; screenShake = 15;
                applyScrapSkill(this.conf);
                for(let i=0; i<15; i++) particles.push(new Particle(this.wx, this.wy, this.conf.color, 'burst'));
                setTimeout(() => this.init(), 5000);
            }
            update() {
                if (!this.active) return;
                this.pulse += 0.05;
                if (Math.hypot(this.wx - player.worldX, this.wy - player.worldY) > 4000) this.init();
            }
            draw() {
                if (!this.active) return;
                const s = worldToScreen(this.wx, this.wy);
                if (s.x < -100 || s.x > width + 100 || s.y < -100 || s.y > height + 100) return;
                ctx.save(); ctx.translate(s.x, s.y);
                const sc = 1 + Math.sin(this.pulse) * 0.15; ctx.scale(sc, sc);
                ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI*2);
                ctx.strokeStyle = this.conf.color; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = this.conf.color + "22"; ctx.fill();
                ctx.fillStyle = this.conf.color; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.conf.text, 0, 0);
                ctx.restore();
            }
        }

        class Fish {
            constructor(key, groupId = null) {
                this.type = TYPES[key]; this.groupId = groupId;
                this.active = true; this.spawn(true);
            }
            spawn(init = false) {
                const ang = Math.random() * Math.PI * 2;
                const dist = init ? (200 + Math.random() * 800) : (1800 + Math.random() * 600);
                this.wx = player.worldX + Math.cos(ang) * dist;
                this.wy = player.worldY + Math.sin(ang) * dist;
                this.hp = this.type.hp * (1 + (level - 1) * 0.3);
                this.maxHp = this.hp;
                this.angle = Math.random() * Math.PI * 2;
                this.spd = this.type.spd * (0.8 + Math.random() * 0.5);
                this.turn = (Math.random() - 0.5) * 0.05;
                this.flee = false; this.active = true;
            }
            update() {
                if (!this.active) return;
                const dx = this.wx - player.worldX;
                const dy = this.wy - player.worldY;
                const dToP = Math.hypot(dx, dy);
                
                if (dToP < CONFIG.fleeRange && this.type.spd > 0) {
                    const fleeA = Math.atan2(dy, dx);
                    this.angle += (fleeA - this.angle) * 0.2;
                    this.spd = this.type.spd * 2.8;
                    this.flee = true;
                } else if (dToP > CONFIG.flockingRange && this.type.spd > 0) {
                    const flockA = Math.atan2(-dy, -dx);
                    this.angle += (flockA - this.angle) * 0.05;
                    this.spd = this.type.spd * 1.1;
                    this.flee = false;
                } else {
                    this.spd = this.type.spd; this.flee = false;
                    this.angle += this.turn;
                    if (Math.random() < 0.01) this.turn = (Math.random() - 0.5) * 0.08;
                }

                this.wx += Math.cos(this.angle) * this.spd;
                this.wy += Math.sin(this.angle) * this.spd;
                if (dToP > 4500) this.spawn();

                if (this.active && dToP < player.size + this.type.size * 0.35) {
                    if (this.type.damage) { 
                        player.hull -= this.type.damage; triggerDamageEffect(); 
                        this.active = false; setTimeout(() => this.spawn(), 3000); 
                    }
                }
            }
            draw() {
                if (!this.active) return;
                const s = worldToScreen(this.wx, this.wy);
                const p = 150;
                if (s.x < -p || s.x > width + p || s.y < -p || s.y > height + p) return;
                ctx.save(); ctx.translate(s.x, s.y);
                if (Math.cos(this.angle) < 0) ctx.scale(-1, 1);
                
                if (this.hp < this.maxHp || this.type.size > 80) {
                    const bw = this.type.size * 0.8;
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(-bw/2, -this.type.size/2 - 12, bw, 5);
                    ctx.fillStyle = this.hp/this.maxHp > 0.3 ? "#4fd1c5" : "#ef4444";
                    ctx.fillRect(-bw/2, -this.type.size/2 - 12, bw * (this.hp/this.maxHp), 5);
                }
                ctx.font = `${this.type.size}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.type.icon, 0, 0);
                ctx.restore();
            }
        }

        // --- 核心改动：巨鲨类 ---
        class Shark {
            constructor() {
                this.type = TYPES.SHARK;
                this.active = true;
                this.state = 'IDLE'; // 'IDLE' or 'CHASE'
                this.outOfRangeTimer = 0;
                this.spawn(true);
            }
            spawn(init = false) {
                const ang = Math.random() * Math.PI * 2;
                const dist = init ? (1500 + Math.random() * 1000) : (2500 + Math.random() * 1000);
                this.wx = player.worldX + Math.cos(ang) * dist;
                this.wy = player.worldY + Math.sin(ang) * dist;
                this.hp = this.type.hp * (1 + (level - 1) * 0.5);
                this.maxHp = this.hp;
                this.angle = Math.random() * Math.PI * 2;
                this.spd = this.type.spdIdle;
                this.turn = (Math.random() - 0.5) * 0.03;
                this.state = 'IDLE';
                this.active = true;
            }
            update() {
                if (!this.active) return;
                const dx = player.worldX - this.wx;
                const dy = player.worldY - this.wy;
                const dist = Math.hypot(dx, dy);

                if (this.state === 'IDLE') {
                    if (dist < CONFIG.sharkDetectRange) {
                        this.state = 'CHASE';
                        this.outOfRangeTimer = 0;
                    } else {
                        this.angle += this.turn;
                        if (Math.random() < 0.01) this.turn = (Math.random() - 0.5) * 0.05;
                        this.spd = this.type.spdIdle;
                    }
                } else if (this.state === 'CHASE') {
                    const targetAngle = Math.atan2(dy, dx);
                    // 缓慢转向目标
                    let angleDiff = targetAngle - this.angle;
                    while(angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    while(angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    this.angle += angleDiff * 0.05;
                    this.spd = this.type.spdChase;

                    if (dist > CONFIG.sharkDetectRange) {
                        this.outOfRangeTimer++;
                        if (this.outOfRangeTimer > CONFIG.sharkChaseTime) {
                            this.state = 'IDLE';
                        }
                    } else {
                        this.outOfRangeTimer = 0;
                    }

                    // 咬人判定
                    if (dist < player.size + 40) {
                        player.hull -= this.type.damage;
                        triggerDamageEffect();
                        // 咬人后短暂击退
                        this.wx -= Math.cos(this.angle) * 150;
                        this.wy -= Math.sin(this.angle) * 150;
                    }
                }

                this.wx += Math.cos(this.angle) * this.spd;
                this.wy += Math.sin(this.angle) * this.spd;

                // 强制回航
                if (dist > 5000) this.spawn();
            }
            draw() {
                if (!this.active) return;
                const s = worldToScreen(this.wx, this.wy);
                if (s.x < -200 || s.x > width + 200 || s.y < -200 || s.y > height + 200) return;

                ctx.save();
                ctx.translate(s.x, s.y);
                const isLeft = Math.cos(this.angle) < 0;
                ctx.scale(isLeft ? -1.5 : 1.5, 1.5);
                
                // 追逐特效
                if (this.state === 'CHASE') {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = "#ef4444";
                }

                // 血条
                const bw = 60;
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(-bw/2, -50, bw, 8);
                ctx.fillStyle = "#f87171"; ctx.fillRect(-bw/2, -50, bw * (this.hp/this.maxHp), 8);
                
                ctx.font = `60px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('🦈', 0, 0);
                ctx.restore();
            }
        }

        class Particle {
            constructor(wx, wy, color, type = 'normal') {
                this.wx = wx; this.wy = wy; this.color = color;
                this.life = 1.0; this.type = type;
                
                this.flip = Math.random() * Math.PI * 2;
                this.flipSpeed = 0.1 + Math.random() * 0.2;
                
                const ang = Math.random() * Math.PI * 2;
                let spd = 5 + Math.random() * 5;

                if (type === 'coin' || type === 'jackpot') {
                    this.size = 12 + Math.random() * 8; 
                    spd = type === 'jackpot' ? 12 + Math.random() * 15 : 6 + Math.random() * 8;
                    this.vx = Math.cos(ang) * spd;
                    this.vy = Math.sin(ang) * spd - (type === 'jackpot' ? 8 : 4);
                    this.life = type === 'jackpot' ? 2.5 : 1.8;
                } else {
                    this.size = Math.random() * 5 + 2;
                    this.vx = Math.cos(ang) * spd;
                    this.vy = Math.sin(ang) * spd;
                }
            }
            update() { 
                this.wx += this.vx; this.wy += this.vy; 
                this.flip += this.flipSpeed;
                if (this.type === 'coin' || this.type === 'jackpot') this.vy += 0.35; 
                this.life -= (this.type === 'jackpot' ? 0.012 : 0.025); 
            }
            draw() {
                const s = worldToScreen(this.wx, this.wy);
                ctx.save(); ctx.globalAlpha = this.life;
                if (this.type === 'coin' || this.type === 'jackpot') {
                    const currentWidth = Math.cos(this.flip);
                    ctx.translate(s.x, s.y);
                    ctx.fillStyle = "#b45309"; 
                    ctx.beginPath(); ctx.ellipse(0, 0, this.size * Math.abs(currentWidth), this.size, 0, 0, Math.PI * 2); ctx.fill();
                    const grad = ctx.createRadialGradient(-this.size/4, -this.size/4, 0, 0, 0, this.size);
                    grad.addColorStop(0, "#fde68a"); grad.addColorStop(1, "#fbbf24");
                    ctx.fillStyle = grad; ctx.scale(currentWidth, 1);
                    ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.beginPath(); ctx.arc(s.x, s.y, this.size, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }

        // --- 功能逻辑 ---

        function worldToScreen(wx, wy) {
            return { x: (wx - camera.x) * camera.zoom + width / 2, y: (wy - camera.y) * camera.zoom + height / 2 };
        }
        function screenToWorld(sx, sy) {
            return { wx: (sx - width/2) / camera.zoom + camera.x, wy: (sy - height/2) / camera.zoom + camera.y };
        }

        function triggerDamageEffect() {
            screenShake = 35;
            const f = document.getElementById('danger-flash');
            if (f) f.classList.add('danger-active');
            setTimeout(() => { if(f) f.classList.remove('danger-active'); }, 150);
        }

        function applyScrapSkill(conf) {
            const frames = Math.floor((Math.random() * (conf.duration[1] - conf.duration[0]) + conf.duration[0]) * 60);
            if (conf.type === 'mult') activeSkills.multishot = frames;
            if (conf.type === 'atk') activeSkills.power = frames;
            if (conf.type === 'rate') activeSkills.haste = frames;
            updateSkillsUI();
        }

        function updateSkillsUI() {
            const list = document.getElementById('skills-list');
            if (!list) return;
            list.innerHTML = '';
            if (activeSkills.multishot > 0) list.innerHTML += `<div class="skill-item">弾幕強化 ${(activeSkills.multishot/60).toFixed(1)}s</div>`;
            if (activeSkills.power > 0) list.innerHTML += `<div class="skill-item">破壊力UP ${(activeSkills.power/60).toFixed(1)}s</div>`;
            if (activeSkills.haste > 0) list.innerHTML += `<div class="skill-item">極速射撃 ${(activeSkills.haste/60).toFixed(1)}s</div>`;
        }

        function initGame() {
            score = 0; collected = 0; level = 1; target = 250; jackpotTimer = 0;
            activeSkills = { multishot: 0, power: 0, haste: 0 };
            player.worldX = player.worldY = CONFIG.worldSize / 2;
            player.hull = CONFIG.hullMax; 
            fishes = []; harpoons = []; scraps = []; particles = []; sharks = [];
            document.body.classList.remove('jackpot-active');

            for(let i=0; i<CONFIG.scrapCount; i++) scraps.push(new Scrap());
            for(let i=0; i<CONFIG.sharkLimit; i++) sharks.push(new Shark());

            const pool = ['FISH_S','FISH_S','FISH_S','FISH_M','FISH_M','FISH_L','WRECK','BAG'];
            while(fishes.length < CONFIG.fishLimit) {
                const key = pool[Math.floor(Math.random()*pool.length)];
                if (key === 'BAG' && (fishes.filter(f=>f.type.isJackpot).length > 0 || Math.random() > 0.05)) continue;
                const groupSize = Math.floor(Math.random()*(TYPES[key].group[1]-TYPES[key].group[0]+1)) + TYPES[key].group[0];
                const cx = player.worldX + (Math.random()-0.5) * 4000;
                const cy = player.worldY + (Math.random()-0.5) * 4000;
                for(let i=0; i<groupSize; i++) {
                    const f = new Fish(key, fishes.length);
                    f.wx = cx + (Math.random()-0.5)*300; f.wy = cy + (Math.random()-0.5)*300;
                    fishes.push(f);
                }
            }
            updateHUD();
        }

        function updateHUD() {
            const scoreEl = document.getElementById('score-text');
            const hullTEl = document.getElementById('hull-text');
            const hullFEl = document.getElementById('hull-fill');
            const goalTEl = document.getElementById('goal-text');
            const goalFEl = document.getElementById('goal-fill');
            const bulletEl = document.getElementById('bullet-count-text');

            if (scoreEl) scoreEl.innerText = score.toLocaleString();
            if (hullTEl) hullTEl.innerText = `${Math.max(0, Math.round(player.hull))}%`;
            if (hullFEl) hullFEl.style.width = `${player.hull}%`;
            if (goalTEl) goalTEl.innerText = `${collected} / ${target}`;
            if (goalFEl) goalFEl.style.width = `${Math.min(100, (collected/target)*100)}%`;
            if (bulletEl) bulletEl.innerText = `BARRAGE: ${activeSkills.multishot > 0 ? 8 : 1}`;
        }

        function update(dt) {
            if (gameState !== 'PLAYING') return;

            Object.keys(activeSkills).forEach(k => { if(activeSkills[k] > 0) activeSkills[k]--; });
            
            const move = joystick.getValues();
            const isMoving = (move.x !== 0 || move.y !== 0);
            if (isMoving) {
                player.vx += (move.x * player.speed - player.vx) * 0.12;
                player.vy += (move.y * player.speed - player.vy) * 0.12;
                player.angle = Math.atan2(player.vy, player.vx);
                camera.targetZoom = 0.75; 
            } else {
                player.vx *= 0.9; player.vy *= 0.9;
                camera.targetZoom = 1.15;
            }
            player.worldX += player.vx; player.worldY += player.vy;
            player.worldX = Math.max(100, Math.min(CONFIG.worldSize-100, player.worldX));
            player.worldY = Math.max(100, Math.min(CONFIG.worldSize-100, player.worldY));

            camera.x += (player.worldX - camera.x) * 0.1;
            camera.y += (player.worldY - camera.y) * 0.1;
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;

            // 自动射击
            const now = Date.now();
            let currentFireRate = activeSkills.haste > 0 ? player.fireRate * 0.5 : player.fireRate;
            if (jackpotTimer > 0) currentFireRate *= 0.3; 

            if (now - player.lastFire > currentFireRate) {
                player.lastFire = now;
                const count = activeSkills.multishot > 0 ? 8 : 1;
                const spreadAngle = activeSkills.multishot > 0 ? Math.PI * 0.4 : 0;
                const startAngle = player.angle - spreadAngle/2;
                for(let i=0; i<count; i++) {
                    const angle = count === 1 ? player.angle : startAngle + i * (spreadAngle/(count-1));
                    harpoons.push(new Harpoon(player.worldX, player.worldY, angle, activeSkills.power > 0));
                }
            }

            // Jackpot
            if (jackpotTimer > 0) {
                jackpotTimer--; screenShake = Math.max(screenShake, 6);
                if (jackpotTimer % 2 === 0) {
                    const corners = [{x: -100, y: -100}, {x: width+100, y: -100}, {x: -100, y: height+100}, {x: width+100, y: height+100}];
                    const c = corners[Math.floor(Math.random()*4)];
                    const wp = screenToWorld(c.x, c.y);
                    particles.push(new Particle(wp.wx, wp.wy, "#ffd700", 'jackpot'));
                }
                if (jackpotTimer === 0) document.body.classList.remove('jackpot-active');
            }

            if (player.hull <= 0) {
                gameState = 'GAMEOVER';
                document.getElementById('screen-gameover').classList.remove('hidden');
                document.getElementById('final-score').innerText = score.toLocaleString();
                return;
            }

            // 警报 UI 更新
            const isAnySharkChasing = sharks.some(s => s.state === 'CHASE');
            const warningEl = document.getElementById('shark-warning');
            if (isAnySharkChasing) warningEl.classList.add('warning-active');
            else warningEl.classList.remove('warning-active');

            scraps.forEach(s => s.update());
            fishes.forEach(f => f.update());
            sharks.forEach(s => s.update());
            particles.forEach(p => p.update());
            
            harpoons.forEach(h => {
                h.update();
                // 鱼类碰撞
                fishes.forEach(f => {
                    if (f.active && Math.hypot(h.wx-f.wx, h.wy-f.wy) < f.type.size * 0.5) {
                        let damage = player.atk;
                        if (h.isSpecial) damage *= 2.5;
                        f.hp -= damage; h.active = false;
                        if (f.hp <= 0) { 
                            f.active = false; collected += f.type.weight; score += f.type.val; 
                            for(let i=0; i<12; i++) particles.push(new Particle(f.wx, f.wy, "#ffd700", 'coin'));
                            for(let i=0; i<8; i++) particles.push(new Particle(f.wx, f.wy, f.type.color, 'burst'));
                            if (f.type.isJackpot) { jackpotTimer = CONFIG.jackpotDuration; document.body.classList.add('jackpot-active'); }
                            setTimeout(() => f.spawn(), 1200); 
                        }
                    }
                });
                // 鲨鱼碰撞
                sharks.forEach(s => {
                    if (s.active && Math.hypot(h.wx-s.wx, h.wy-s.wy) < s.type.size * 0.6) {
                        let damage = player.atk;
                        if (h.isSpecial) damage *= 2.5;
                        s.hp -= damage; h.active = false;
                        if (s.hp <= 0) {
                            s.active = false; collected += s.type.weight; score += s.type.val;
                            for(let i=0; i<40; i++) particles.push(new Particle(s.wx, s.wy, "#ffd700", 'coin'));
                            for(let i=0; i<20; i++) particles.push(new Particle(s.wx, s.wy, s.type.color, 'burst'));
                            setTimeout(() => s.spawn(), 10000); 
                        }
                    }
                });
            });

            harpoons = harpoons.filter(h => h.active);
            particles = particles.filter(p => p.life > 0);
            if (screenShake > 0) screenShake *= 0.9;
            updateHUD();
        }

        function draw() {
            ctx.fillStyle = "#010409"; ctx.fillRect(0,0,width,height);
            const gridS = 300 * camera.zoom;
            const startX = ((-camera.x * camera.zoom) % gridS + (width/2) % gridS + gridS) % gridS;
            const startY = ((-camera.y * camera.zoom) % gridS + (height/2) % gridS + gridS) % gridS;
            ctx.strokeStyle = "rgba(79, 209, 197, 0.05)"; ctx.lineWidth = 1;
            for(let x=startX; x<width; x+=gridS) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke(); }
            for(let y=startY; y<height; y+=gridS) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke(); }

            ctx.save();
            if (screenShake > 1) ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
            fishes.forEach(f => f.draw());
            scraps.forEach(s => s.draw());
            sharks.forEach(s => s.draw());
            harpoons.forEach(h => h.draw());
            particles.forEach(p => p.draw());
            
            const pS = worldToScreen(player.worldX, player.worldY);
            ctx.save(); ctx.translate(pS.x, pS.y); ctx.rotate(player.angle + Math.PI/2); ctx.scale(camera.zoom, camera.zoom);
            ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.moveTo(0, -35); ctx.lineTo(25, 25); ctx.lineTo(-25, 25); ctx.closePath(); ctx.fill();
            ctx.strokeStyle = "#4fd1c5"; ctx.lineWidth = 4; ctx.stroke();
            ctx.restore();
            ctx.restore();
            joystick.draw();
        }

        function loop(ts) {
            const dt = ts - lastTime; lastTime = ts;
            update(dt); draw();
            requestAnimationFrame(loop);
        }

        const handleTouch = (e) => {
            e.preventDefault(); const touches = e.touches; let jFound = false;
            for (let i = 0; i < touches.length; i++) {
                const t = touches[i];
                if (t.clientX < width * 0.5) {
                    if (!joystick.active) { joystick.active=true; joystick.baseX=t.clientX; joystick.baseY=t.clientY; }
                    joystick.currX=t.clientX; joystick.currY=t.clientY; jFound=true;
                }
            }
            if (!jFound) joystick.active = false;
        };

        canvas.ontouchstart = handleTouch; canvas.ontouchmove = handleTouch; canvas.ontouchend = () => joystick.active = false;
        canvas.onmousedown = (e) => { if(e.clientX < width*0.5) { joystick.active=true; joystick.baseX=e.clientX; joystick.baseY=e.clientY; joystick.currX=e.clientX; joystick.currY=e.clientY; } };
        window.onmousemove = (e) => { if(joystick.active) { joystick.currX=e.clientX; joystick.currY=e.clientY; } };
        window.onmouseup = () => joystick.active = false;

        document.getElementById('btn-start').onclick = () => { gameState = 'PLAYING'; document.getElementById('screen-home').classList.add('hidden'); initGame(); };
        document.getElementById('btn-restart').onclick = () => { gameState = 'HOME'; document.getElementById('screen-gameover').classList.add('hidden'); document.getElementById('screen-home').classList.remove('hidden'); };

        window.onload = () => { resize(); window.addEventListener('resize', resize); requestAnimationFrame(loop); };
    </script>
</body>
</html>
