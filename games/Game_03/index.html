<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黄金倍增手 - 万鱼群集版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #001529;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        .ui-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(0, 21, 41, 0.9);
            color: white;
            transition: opacity 0.3s;
        }
        .hidden { display: none !important; opacity: 0; }
        
        /* 顶部HUD */
        .hud {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            pointer-events: none;
            z-index: 10;
        }
        .xp-container {
            width: 100%; height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00e5ff, #007bff); transition: width 0.3s; }

        /* 卡片 */
        .card-container { display: flex; gap: 15px; margin-top: 30px; }
        .skill-card {
            width: 130px; height: 180px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 2px solid #fbbf24;
            border-radius: 12px;
            display: flex; flex-direction: column;
            align-items: center; padding: 15px;
            cursor: pointer; text-align: center;
        }
        .skill-card:hover { transform: translateY(-5px); border-color: #fff; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }

        /* 升级按钮 */
        .upgrade-item {
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 8px;
            margin: 5px;
            display: flex;
            justify-content: space-between;
            width: 320px;
            align-items: center;
        }
        .btn-action {
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
            color: #000;
            padding: 8px 15px; border-radius: 6px; font-weight: bold;
        }
        .btn-action:disabled {
            background: #444;
            opacity: 0.5;
            color: #888;
        }
    </style>
</head>
<body>

    <!-- HUD -->
    <div id="hud" class="hud hidden">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-3xl font-black text-yellow-400">💰 <span id="coin-display">0</span></div>
                <div class="text-xs opacity-60">关卡 <span id="current-level-display">1</span></div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold text-white">⏱️ <span id="timer-display">25</span>s</div>
                <div class="text-[10px] opacity-50 uppercase tracking-widest">Survive</div>
            </div>
            <div class="text-right">
                <div class="text-xs opacity-60">火力: <span id="ball-count-ui">0</span></div>
            </div>
        </div>
        <div class="xp-container"><div id="xp-bar"></div></div>
    </div>

    <!-- 主界面 -->
    <div id="home-screen" class="ui-screen">
        <h1 class="text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-600">黄金倍增手</h1>
        <p class="text-cyan-200 opacity-60 mb-8 italic">—— 万鱼群集：屏息割草 ——</p>
        
        <div class="mb-8 text-center">
            <div class="text-6xl font-black text-yellow-400 mb-2">💰 <span id="home-coins">0</span></div>
            <button id="start-btn" class="bg-gradient-to-r from-yellow-400 to-orange-500 text-black px-12 py-4 rounded-full text-2xl font-black hover:scale-105 transition active:scale-95 shadow-lg shadow-orange-500/20">
                进入第 <span id="home-level">1</span> 关
            </button>
        </div>

        <div class="flex flex-col gap-2">
            <div class="upgrade-item">
                <div class="flex flex-col">
                    <span>永久射速 <span id="lvl-fire" class="text-yellow-400 ml-2">Lv.1</span></span>
                </div>
                <button id="up-fire-rate" class="btn-action">升级 <span id="cost-fire">40</span></button>
            </div>
            <div class="upgrade-item">
                <div class="flex flex-col">
                    <span>永久威力 <span id="lvl-power" class="text-yellow-400 ml-2">Lv.1</span></span>
                </div>
                <button id="up-ball-power" class="btn-action">升级 <span id="cost-power">80</span></button>
            </div>
        </div>
    </div>

    <!-- 升级三选一 -->
    <div id="level-up-modal" class="ui-screen hidden" style="background: rgba(0,0,0,0.85)">
        <h2 class="text-4xl font-black text-yellow-400 italic">战力提升!</h2>
        <p class="opacity-70 mt-2">选择一个关卡内临时强化</p>
        <div class="card-container" id="card-selection"></div>
    </div>

    <!-- 关卡成功 -->
    <div id="win-screen" class="ui-screen hidden">
        <div class="text-6xl mb-4">🏆</div>
        <h2 class="text-4xl font-black text-green-400">挑战成功!</h2>
        <p class="mt-4 opacity-70">成功清空海域，金币满载而归</p>
        <div class="text-4xl font-bold my-6 text-yellow-400">+ <span id="win-reward">150</span> 💰</div>
        <button id="back-home-win" class="btn-action px-10 py-3 text-xl">下一关</button>
    </div>

    <!-- 游戏结束 -->
    <div id="game-over-screen" class="ui-screen hidden">
        <h1 class="text-6xl font-black text-red-500 mb-4">海域失守!</h1>
        <p class="text-xl mb-8">鱼群突破了最后的防线...</p>
        <button id="back-home-fail" class="btn-action px-10 py-3 text-xl bg-red-600 border-none text-white">返回基地</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = {
            coins: 0,
            level: 1,
            permFireRateLvl: 1,
            permPowerLvl: 1
        };

        const BASE_LEVEL_TIME = 20;
        const LEVEL_TIME_INC = 5; 
        const MAX_FISH_SPEED = 1.6; 

        let state = {
            status: 'home',
            xp: 0, maxXp: 15, // 初始所需经验略微增加
            ballPower: 1,
            burstCount: 1,
            launchInterval: 300,
            ballLifeTime: 3000,
            timeLeft: 20,
            lastLaunchTime: 0,
            launcherX: 0,
            spawnTimers: [0, 60],
            schoolTimer: 0,
            targetDescentSpeed: 0.4
        };

        const SKILLS = [
            { id: 'fire_rate', name: '急速装填', desc: '射击间隔 -20%', icon: '⚡', action: () => state.launchInterval *= 0.8 },
            { id: 'power', name: '重型弹头', desc: '子弹威力 +2', icon: '💥', action: () => state.ballPower += 2 },
            { id: 'multishot', name: '散射系统', desc: '单次发射 +1', icon: '🔱', action: () => state.burstCount += 1 },
            { id: 'duration', name: '航程优化', desc: '子弹射程 +1s', icon: '🏹', action: () => state.ballLifeTime += 1000 }
        ];

        let W, H, GATES = [], TARGETS = [], BALLS = [], PARTICLES = [], COIN_EFFECTS = [];
        const DEAD_LINE_Y_RATIO = 0.85;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            state.launcherX = W / 2;
        }
        window.addEventListener('resize', resize);

        function startLevel() {
            state.status = 'playing';
            state.xp = 0; state.maxXp = 15;
            state.timeLeft = BASE_LEVEL_TIME + (player.level - 1) * LEVEL_TIME_INC;
            state.targetDescentSpeed = Math.min(MAX_FISH_SPEED, 0.4 + (player.level - 1) * 0.035);
            state.ballPower = player.permPowerLvl;
            state.launchInterval = 300 * Math.pow(0.88, player.permFireRateLvl - 1);
            state.burstCount = 1;
            state.ballLifeTime = 3000;
            GATES = []; TARGETS = []; BALLS = []; PARTICLES = []; COIN_EFFECTS = [];
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            // 初始直接刷两波鱼
            spawnFishSchool(W * 0.3, -100);
            spawnFishSchool(W * 0.7, -250);
            updateUI();
        }

        function createCoinExplosion(x, y, amount) {
            const count = Math.min(amount, 15); 
            for(let i=0; i<count; i++) {
                COIN_EFFECTS.push({
                    x, y,
                    vx: (Math.random()-0.5) * 12,
                    vy: (Math.random()-0.8) * 18,
                    life: 1,
                    size: 10 + Math.random() * 6,
                    rotationZ: Math.random() * Math.PI * 2,
                    flipX: Math.random() * Math.PI * 2,
                    flipSpeed: 0.15 + Math.random() * 0.2
                });
            }
        }

        function spawnFishSchool(centerX, centerY) {
            // 优化：鱼群数量大幅增加，实现满屏感
            const count = 12 + Math.min(20, player.level * 2);
            const sharkChance = Math.min(0.5, player.level * 0.08);
            
            for(let i=0; i<count; i++){
                const isShark = Math.random() < sharkChance && i === 0;
                const hpBase = isShark ? 30 + player.level * 12 : 3 + player.level * 1.2;
                const hp = hpBase + Math.floor(Math.random()*6);
                
                TARGETS.push({
                    type: isShark ? 'shark' : 'fish',
                    baseX: centerX + (Math.random()-0.5)*300, // 扩散更广
                    x: 0, y: centerY + (Math.random()-0.5)*200, // 纵向散布更广
                    hp: hp, maxHp: hp, 
                    radius: isShark ? 26 + Math.random()*10 : 9 + Math.random()*7,
                    color: isShark ? `hsl(210, 50%, 40%)` : `hsl(${190 + Math.random()*40}, 80%, 60%)`,
                    phase: Math.random()*Math.PI*2,
                    amp: isShark ? 45 : 30, 
                    freq: isShark ? 0.012 : 0.008,
                    speed: state.targetDescentSpeed * (isShark ? 1.15 : 0.85) * (0.9 + Math.random()*0.2)
                });
            }
        }

        function spawnGate(row) {
            const isTop = row === 0;
            const isNeg = Math.random() < 0.22;
            let type, val, color;
            if(isNeg){
                type = Math.random() < 0.5 ? 'div' : 'sub';
                val = type === 'div' ? 2 : 4 + Math.floor(player.level * 0.6);
                color = '#ff4d4d';
            } else {
                type = Math.random() < 0.75 ? 'mul' : 'add';
                val = type === 'mul' ? 2 : 20 + player.level * 12;
                color = type === 'mul' ? '#4cd137' : '#00a8ff';
            }
            GATES.push({
                x: isTop ? W : -100, y: isTop ? H*0.4 : H*0.6,
                vx: isTop ? -2.2 : 2.2, type, val, currentVal: val,
                w: 100, h: 45, color
            });
        }

        function createParticles(x, y, color) {
            for(let i=0; i<4; i++) PARTICLES.push({ x, y, vx: (Math.random()-0.5) * 6, vy: (Math.random()-0.5) * 6, life: 1, color });
        }

        class Ball {
            constructor(x, y, vx, vy, color = '#fff') {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.radius = 5; this.color = color; this.active = true;
                this.spawnTime = Date.now();
            }
            update() {
                if(state.status !== 'playing') return;
                if(Date.now() - this.spawnTime > state.ballLifeTime){ this.active = false; return; }
                this.x += this.vx; this.y += this.vy;
                if(this.x < 5 || this.x > W-5) this.vx *= -1;
                if(this.y < 5) this.vy *= -1;
                if(this.y > H) this.active = false;

                for(let i=GATES.length-1; i>=0; i--){
                    let g = GATES[i];
                    if(this.y > g.y && this.y < g.y + g.h && this.x > g.x && this.x < g.x + g.w) {
                        let remove = false;
                        if(g.type === 'mul'){
                            for(let j=0; j<g.val-1; j++) BALLS.push(new Ball(this.x, this.y, this.vx+(Math.random()-0.5)*12, this.vy+(Math.random()-0.5)*4, '#00e5ff'));
                            remove = true;
                        } else if(g.type === 'add'){
                            for(let j=0; j<g.val; j++) BALLS.push(new Ball(this.x, this.y, (Math.random()-0.5)*14, -12-Math.random()*4, '#4fc3f7'));
                            remove = true;
                        } else if(g.type === 'sub'){
                            this.active = false; g.currentVal--; if(g.currentVal<=0) remove = true;
                        } else if(g.type === 'div'){
                            if(Math.random()<0.5) this.active = false; remove = true;
                        }
                        if(remove) GATES.splice(i, 1);
                    }
                }

                for(let i=TARGETS.length-1; i>=0; i--){
                    let t = TARGETS[i];
                    if(Math.hypot(this.x - t.x, this.y - t.y) < t.radius + this.radius) {
                        t.hp -= state.ballPower;
                        this.vy *= -0.8; createParticles(this.x, this.y, t.color);
                        if(t.hp <= 0){
                            const reward = t.type === 'shark' ? 30 : 5;
                            player.coins += reward; state.xp += t.type === 'shark' ? 6 : 1;
                            createCoinExplosion(t.x, t.y, reward);
                            TARGETS.splice(i, 1);
                            if(state.xp >= state.maxXp) levelUpRoguelike();
                        }
                        break;
                    }
                }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        function levelUpRoguelike() {
            state.status = 'levelUp';
            state.xp = 0; state.maxXp = Math.floor(state.maxXp * 1.35); 
            const pool = [...SKILLS].sort(() => Math.random()-0.5).slice(0, 3);
            const container = document.getElementById('card-selection');
            container.innerHTML = '';
            pool.forEach(s => {
                const div = document.createElement('div');
                div.className = 'skill-card';
                div.innerHTML = `<div class="text-4xl mb-2">${s.icon}</div><div class="font-bold text-yellow-400">${s.name}</div><div class="text-[10px] mt-2 opacity-60">${s.desc}</div>`;
                div.onclick = () => { s.action(); state.status = 'playing'; document.getElementById('level-up-modal').classList.add('hidden'); };
                container.appendChild(div);
            });
            document.getElementById('level-up-modal').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('coin-display').innerText = player.coins;
            document.getElementById('home-coins').innerText = player.coins;
            document.getElementById('current-level-display').innerText = player.level;
            document.getElementById('home-level').innerText = player.level;
            document.getElementById('timer-display').innerText = Math.max(0, Math.ceil(state.timeLeft));
            document.getElementById('xp-bar').style.width = (state.xp / state.maxXp * 100) + '%';
            document.getElementById('ball-count-ui').innerText = BALLS.length;
            document.getElementById('lvl-fire').innerText = 'Lv.' + player.permFireRateLvl;
            document.getElementById('lvl-power').innerText = 'Lv.' + player.permPowerLvl;
            const fireCost = 40 * player.permFireRateLvl;
            const powerCost = 80 * player.permPowerLvl;
            document.getElementById('cost-fire').innerText = fireCost;
            document.getElementById('cost-power').innerText = powerCost;
            document.getElementById('up-fire-rate').disabled = player.coins < fireCost;
            document.getElementById('up-ball-power').disabled = player.coins < powerCost;
        }

        function update() {
            if(state.status === 'home') return;
            if(state.status === 'playing') {
                state.timeLeft -= 1/60;
                if(state.timeLeft <= 0) {
                    state.status = 'win';
                    const reward = 100 + player.level * 40; 
                    player.coins += reward;
                    document.getElementById('win-reward').innerText = reward;
                    document.getElementById('win-screen').classList.remove('hidden');
                }
                const now = Date.now();
                if(now - state.lastLaunchTime > state.launchInterval) {
                    state.lastLaunchTime = now;
                    for(let i=0; i<state.burstCount; i++) BALLS.push(new Ball(state.launcherX, H*0.9, (Math.random()-0.5)*4, -15));
                }
                state.spawnTimers.forEach((t, i) => {
                    state.spawnTimers[i]++;
                    if(state.spawnTimers[i] > 105) { spawnGate(i); state.spawnTimers[i] = 0; }
                });
                state.schoolTimer++;
                // 优化：鱼群刷新间隔缩短 (170 -> 110)，增加屏幕鱼量
                if(state.schoolTimer > 110) { 
                    spawnFishSchool(Math.random()*W, -150); 
                    state.schoolTimer = 0; 
                }

                GATES.forEach((g, i) => { g.x += g.vx; if(g.x < -150 || g.x > W+150) GATES.splice(i, 1); });
                TARGETS.forEach(t => {
                    t.y += t.speed;
                    t.x = t.baseX + Math.sin(t.y*t.freq + t.phase)*t.amp;
                    if(t.y + t.radius > H * DEAD_LINE_Y_RATIO) {
                        state.status = 'fail';
                        document.getElementById('game-over-screen').classList.remove('hidden');
                    }
                });
                for(let i=BALLS.length-1; i>=0; i--) { BALLS[i].update(); if(!BALLS[i].active) BALLS.splice(i, 1); }
            }
            
            PARTICLES.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.04; if(p.life <= 0) PARTICLES.splice(i,1); });
            
            COIN_EFFECTS.forEach((c, i) => {
                c.x += c.vx; c.y += c.vy;
                c.vy += 0.6; 
                c.life -= 0.015;
                c.flipX += c.flipSpeed;
                if(c.life <= 0) COIN_EFFECTS.splice(i, 1);
            });
            updateUI();
        }

        function drawFish(ctx, f) {
            ctx.save(); ctx.translate(f.x, f.y);
            const angle = Math.atan2(f.speed, Math.cos(f.y*f.freq+f.phase)*f.amp*f.freq);
            ctx.rotate(angle);
            ctx.fillStyle = f.color;
            ctx.beginPath(); 
            if(f.type === 'shark') {
                ctx.ellipse(0, 0, f.radius*2.2, f.radius*0.9, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath(); ctx.moveTo(-f.radius*0.5, -f.radius*0.7); ctx.lineTo(0, -f.radius*1.5); ctx.lineTo(f.radius*0.5, -f.radius*0.7); ctx.fill();
            } else {
                ctx.ellipse(0,0, f.radius*1.5, f.radius, 0, 0, Math.PI*2); ctx.fill();
            }
            ctx.beginPath(); ctx.moveTo(-f.radius*(f.type==='shark'?1.8:1.2), 0); ctx.lineTo(-f.radius*2.5, -f.radius); ctx.lineTo(-f.radius*2.5, f.radius); ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(f.radius * (f.type==='shark'?1.5:0.8), -f.radius * 0.3, f.radius * 0.2, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath(); ctx.arc(f.radius * (f.type==='shark'?1.6:0.85), -f.radius * 0.3, f.radius * 0.1, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            if(f.hp < f.maxHp) {
                const bw = f.radius * 2.5;
                ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(f.x-bw/2, f.y-f.radius-15, bw, 5);
                ctx.fillStyle = "#ff4d4d"; ctx.fillRect(f.x-bw/2, f.y-f.radius-15, bw * (Math.max(0, f.hp/f.maxHp)), 5);
            }
        }

        function draw() {
            ctx.clearRect(0,0,W,H);
            if(state.status === 'home') return;

            ctx.beginPath(); ctx.moveTo(0, H*DEAD_LINE_Y_RATIO); ctx.lineTo(W, H*DEAD_LINE_Y_RATIO);
            ctx.strokeStyle = "rgba(255, 77, 77, 0.4)"; ctx.setLineDash([8, 12]); ctx.lineWidth = 4; ctx.stroke(); ctx.setLineDash([]);

            TARGETS.forEach(f => drawFish(ctx, f));
            GATES.forEach(g => {
                ctx.fillStyle = g.color; ctx.globalAlpha = 0.85;
                ctx.beginPath(); ctx.roundRect(g.x, g.y, g.w, g.h, 12); ctx.fill();
                ctx.globalAlpha = 1; ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(g.x, g.y, g.w, g.h);
                ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
                ctx.fillText(g.type==='mul'?'×'+g.val:g.type==='add'?'+'+g.val:g.type==='sub'?'-'+g.currentVal:'÷'+g.val, g.x+g.w/2, g.y+g.h/2 + 8);
            });

            ctx.fillStyle = "#4fc3f7"; ctx.fillRect(state.launcherX - 35, H*0.88, 70, 45);
            ctx.fillStyle = "#0288d1"; ctx.fillRect(state.launcherX - 18, H*0.88-18, 36, 25);

            BALLS.forEach(b => b.draw());
            PARTICLES.forEach(p => { 
                ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); ctx.restore();
            });

            COIN_EFFECTS.forEach(c => {
                ctx.save();
                ctx.globalAlpha = c.life;
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rotationZ); 
                const flipScale = Math.sin(c.flipX);
                const sideThickness = 3; 
                ctx.fillStyle = "#d97706"; 
                ctx.beginPath();
                ctx.ellipse(0, sideThickness * (1 - Math.abs(flipScale)), c.size, c.size * Math.abs(flipScale), 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#fbbf24"; 
                ctx.beginPath();
                ctx.ellipse(0, 0, c.size, c.size * Math.abs(flipScale), 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "#d97706";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.ellipse(0, 0, c.size * 0.7, c.size * 0.7 * Math.abs(flipScale), 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            });
        }

        document.getElementById('start-btn').onclick = startLevel;
        document.getElementById('back-home-win').onclick = () => {
            player.level++; 
            state.status = 'home';
            document.getElementById('win-screen').classList.add('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        };
        document.getElementById('back-home-fail').onclick = () => {
            state.status = 'home';
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        };

        document.getElementById('up-fire-rate').onclick = () => {
            const cost = 40 * player.permFireRateLvl;
            if(player.coins >= cost) { player.coins -= cost; player.permFireRateLvl++; updateUI(); }
        };
        document.getElementById('up-ball-power').onclick = () => {
            const cost = 80 * player.permPowerLvl;
            if(player.coins >= cost) { player.coins -= cost; player.permPowerLvl++; updateUI(); }
        };

        const handleMove = (e) => { 
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            state.launcherX = Math.max(35, Math.min(W - 35, x)); 
        };
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('touchmove', handleMove);

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        resize();
        loop();
    </script>
</body>
</html>
